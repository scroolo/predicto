version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: predicto-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:predicto}
      POSTGRES_USER: ${POSTGRES_USER:predicto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:predicto}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:predicto} -d ${POSTGRES_DB:predicto}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: predicto-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: predicto-adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
  redisdata:
