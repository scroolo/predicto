services:
  postgres:
    image: postgres:16
    container_name: predicto-db
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-predicto}
      POSTGRES_USER: ${POSTGRES_USER:-predicto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-predicto}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-predicto} -d ${POSTGRES_DB:-predicto}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - predicto-net

  redis:
    image: redis:7
    container_name: predicto-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - predicto-net

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:latest
    container_name: predicto-backend
    restart: unless-stopped
    environment:
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/predicto
      DATASOURCE_USERNAME: ${POSTGRES_USER:-predicto}
      DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-predicto}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:-admin}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-admin@predicto.local}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-admin123}
      CITO_API_KEY: ${CITO_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - predicto-net

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:latest
    container_name: predicto-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - predicto-net

  reverse-proxy:
    image: nginx:alpine
    container_name: predicto-reverse-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - frontend
    networks:
      - predicto-net

volumes:
  pgdata:
  redisdata:

networks:
  predicto-net:
    driver: bridge
