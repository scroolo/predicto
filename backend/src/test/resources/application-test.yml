spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  redis:
    host: localhost
    port: 6379
cors:
  allowed-origins: http://localhost:5173
jwt:
  secret: test-secret-key-that-is-at-least-thirty-two-characters-long
  expiration-ms: 86400000
cito:
  api:
    mock-enabled: true
    base-url: https://api.citoapi.com/api/v1
    api-key: ""
  sync:
    catalog-interval-ms: 999999999
    schedule-interval-ms: 999999999
    result-interval-ms: 999999999
    lock-interval-ms: 999999999
