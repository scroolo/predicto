server:
  port: 8080
  tomcat:
    max-http-form-post-size: 1MB

app:
  cookie:
    secure: false

spring:
  servlet:
    multipart:
      max-request-size: 1MB
      max-file-size: 512KB

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/predicto}
    username: ${DB_USERNAME:predicto}
    password: ${DB_PASSWORD:predicto}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  mail:
    host: ${MAIL_HOST:smtp.protonmail.ch}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_STARTTLS:true}

jwt:
  secret: ${JWT_SECRET:predicto-dev-secret-key-change-in-production-min-32-chars}
  expiration-ms: 86400000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

pandascore:
  mock-enabled: ${PANDASCORE_MOCK_ENABLED:false}
  token: ${PANDASCORE_API_TOKEN:}
  sync:
    catalog-delay: 86400000
    match-delay: 21600000
    result-delay: 3600000
    lock-delay: 60000

openf1:
  api:
    base-url: https://api.openf1.org/v1

discord:
  oauth2:
    client-id: ${DISCORD_CLIENT_ID:}
    client-secret: ${DISCORD_CLIENT_SECRET:}
    redirect-uri: ${DISCORD_REDIRECT_URI:http://localhost:8080/api/auth/discord/callback}
    scope: identify email
    frontend-url: ${DISCORD_FRONTEND_URL:http://localhost:5173}

logging:
  level:
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false
